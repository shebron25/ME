<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Layout</title>
  <style>
    body { margin: 0; background: black; }
    .video-container { width: 100vw; overflow: hidden; }
    video { width: 100%; height: auto; display: block; object-fit: cover; }
    @media (min-width: 768px) { .mobile { display: none; } }
    @media (max-width: 767px) { .desktop { display: none; } }
  </style>
</head>
<body>

  <div class="mobile">
    <div class="video-container"><video autoplay muted loop playsinline><source src="middle.mp4" type="video/mp4" /></video></div>
    <div class="video-container"><video autoplay muted loop playsinline><source src="down.mp4" type="video/mp4" /></video></div>
  </div>

  <div class="desktop">
    <div class="video-container"><video autoplay muted loop playsinline><source src="middle desk.mp4" type="video/mp4" /></video></div>
    <div class="video-container"><video autoplay muted loop playsinline><source src="down desk.mp4" type="video/mp4" /></video></div>
  </div>

</body>
</html>
